<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <style>
        @media print {
            table {
                border: 1px solid black;
                width: 100% !important;
                border-collapse: collapse;
            }
            th, td {
                border: 1px solid black;
                color: black;
                white-space: nowrap !important;
                word-break: keep-all !important;
            }
        }
    </style>
</head>
<body>
    <div class="main-wrapper" style="display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; max-width: 960px; box-sizing: border-box;">
        <!-- 관리자 로그인 폼 -->
    <div class="glass-container" id="adminLoginForm">
        <h2>관리자 로그인</h2>
        <div class="form-group">
            <label for="adminId">아이디</label>
            <input type="text" id="adminId" value="admin" readonly>
        </div>
        <div class="form-group">
            <label for="adminPassword">비밀번호</label>
            <input type="password" id="adminPassword" placeholder="관리자 비밀번호">
        </div>
        <button id="adminLoginBtn">로그인</button>
        <div class="link-text">
            <a href="index.html">일반 사용자로 돌아가기</a>
        </div>
    </div>

    <!-- 관리자 대시보드 -->
    <div class="glass-container wide hidden" id="adminDashboard">
        
        <!-- 탭 메뉴 -->
        <div class="tab-header no-print" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="tab-btn active" data-tab="attendanceTab" style="flex: 1;">근태 현황</button>
            <button class="tab-btn secondary-button" data-tab="memberTab" style="flex: 1;">회원 관리</button>
        </div>

        <!-- 근태 현황 탭 -->
        <div id="attendanceTab" class="tab-content active">
            <div class="dashboard-header">
                <h2 id="dashboardTitle">전체 PC 접속시간 현황 보고서</h2>
            <div class="header-actions">
                <button id="changePwdBtn" class="secondary-button small-btn">비밀번호 변경</button>
                <button id="adminLogoutBtn" class="secondary-button small-btn">로그아웃</button>
            </div>
        </div>
        
        <div class="filter-section no-print">
            <div class="filter-inputs">
                <div class="input-group">
                    <label for="filterDate">📅 날짜 선택</label>
                    <input type="date" id="filterDate" class="filter-input">
                </div>
                <div class="input-group">
                    <label for="filterName">👤 직원 검색</label>
                    <input type="text" list="employeeList" id="filterName" placeholder="전체 직원" class="filter-input">
                    <datalist id="employeeList"></datalist>
                </div>
            </div>
            <div class="filter-actions">
                <button id="refreshBtn" class="filter-btn">조회</button>
                <button id="printBtn" class="secondary-button filter-btn">보고서 인쇄</button>
            </div>
        </div>

        <div class="seal-upload-section no-print">
            <label for="sealUpload">직인 업로드:</label>
            <input type="file" id="sealUpload" accept="image/*">
            <img id="sealPreview" src="" alt="직인 미리보기">
        </div>

        <div style="overflow-x: auto; width: 100%;">
            <table id="statsTable" style="width: 100%; font-size: 0.9em;">
                <thead>
                <tr>
                    <th style="white-space: nowrap;">날짜</th>
                    <th style="white-space: nowrap;">이름</th>
                    <th style="white-space: nowrap;">출근(PC 켠 시간)</th>
                    <th style="white-space: nowrap;">퇴근(PC 끈 시간)</th>
                </tr>
            </thead>
            <tbody id="statsTableBody">
                <!-- 데이터가 여기에 렌더링 됩니다 -->
            </tbody>
        </table>
        </div>
        </div> <!-- // 근태 현황 탭 끝 -->

        <!-- 회원 관리 탭 -->
        <div id="memberTab" class="tab-content" style="display: none;">
            <div class="dashboard-header">
                <h2>회원 관리</h2>
                <div class="header-actions">
                    <button class="secondary-button small-btn" onclick="document.getElementById('changePwdBtn').click()">비밀번호 변경</button>
                    <button class="secondary-button small-btn" onclick="document.getElementById('adminLogoutBtn').click()">로그아웃</button>
                </div>
            </div>
            
            <div style="overflow-x: auto; width: 100%;">
                <table id="usersTable" style="width: 100%; font-size: 0.9em;" class="card-table">
                    <thead>
                        <tr>
                            <th style="white-space: nowrap;">부서</th>
                            <th style="white-space: nowrap;">이름</th>
                            <th style="white-space: nowrap;">직급</th>
                            <th style="white-space: nowrap;">상태</th>
                            <th style="white-space: nowrap;">비밀번호 재설정</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- 회원 데이터가 여기에 렌더링 됩니다 -->
                    </tbody>
                </table>
            </div>
        </div> <!-- // 회원 관리 탭 끝 -->

    </div> <!-- // 관리자 대시보드 끝 -->

    <!-- 인쇄용 레이아웃 -->
    <div id="printArea" class="print-only">
        <h2 id="printTitle" style="text-align: center; margin-bottom: 30px;">PC 접속시간 현황 보고서</h2>
        <div id="printTableContainer"></div>
        
        <div id="printCertifyText" style="text-align: center; margin-top: 60px; font-size: 20px; font-weight: bold; letter-spacing: 1px;">
            위와 같이 직원의 근무 사실을 증명합니다.
        </div>
        
        <div id="printDateText" style="text-align: center; margin-top: 40px; font-size: 18px; letter-spacing: 1px;">
            출력 날짜 : 
        </div>

        <div style="text-align: center; margin-top: 100px;">
            <div class="seal-container">
                강동어울림복지관장
                <img id="printSealImg" class="seal-img" src="" alt="" style="display: none;">
            </div>
        </div>
    </div>

    <!-- 비밀번호 변경 모달 -->
    <div class="modal-overlay" id="pwdModal">
        <div class="modal-content">
            <h3>관리자 비밀번호 변경</h3>
            <div class="form-group">
                <input type="password" id="oldPwd" placeholder="현재 비밀번호">
            </div>
            <div class="form-group">
                <input type="password" id="newPwd" placeholder="새 비밀번호 (숫자 4자리 권장)">
            </div>
            <button id="savePwdBtn" style="margin-bottom: 10px;">변경 저장</button>
            <button id="cancelPwdBtn" class="secondary-button">취소</button>
        </div>
    </div>

    <script>
        // 관리자 전용 로직
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const adminLoginForm = document.getElementById('adminLoginForm');
            const adminDashboard = document.getElementById('adminDashboard');
            
            // 로그인 상태 확인 (세션 스토리지 사용)
            if (sessionStorage.getItem('adminLogged') === 'true') {
                adminLoginForm.classList.add('hidden');
                adminDashboard.classList.remove('hidden');
                setDefaultDate();
                loadStats();
                loadSeal();
                loadUsers();
            }

            document.getElementById('adminLoginBtn').addEventListener('click', async () => {
                const pwd = document.getElementById('adminPassword').value;
                if(!pwd) return alert('비밀번호를 입력하세요.');
                
                document.getElementById('adminLoginBtn').disabled = true;
                const hash = await sha256(pwd);

                try {
                    const url = `${CONFIG.GAS_URL}?action=adminLogin&adminId=admin&password=${encodeURIComponent(hash)}&t=${Date.now()}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        sessionStorage.setItem('adminLogged', 'true');
                        adminLoginForm.classList.add('hidden');
                        adminDashboard.classList.remove('hidden');
                        setDefaultDate();
                        loadStats();
                        loadSeal();
                        loadUsers();
                    } else {
                        alert(result.message);
                    }
                } catch(e) {
                    alert('서버 통신 오류');
                } finally {
                    document.getElementById('adminLoginBtn').disabled = false;
                }
            });

            document.getElementById('adminLogoutBtn').addEventListener('click', () => {
                sessionStorage.removeItem('adminLogged');
                location.reload();
            });

            // 통계 데이터 로드
            let allStatsData = [];
            
            async function loadStats() {
                const tbody = document.getElementById('statsTableBody');
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">데이터를 불러오는 중...</td></tr>';
                
                try {
                    const url = `${CONFIG.GAS_URL}?action=getStats&t=${Date.now()}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        allStatsData = result.data;
                        updateNameFilterOptions(allStatsData);
                        renderTable();
                    } else {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">불러오기 실패</td></tr>';
                    }
                } catch(e) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">통신 오류</td></tr>';
                }
            }

            function updateNameFilterOptions(data) {
                const employeeList = document.getElementById('employeeList');
                if (!employeeList) return;
                
                const names = [...new Set(data.map(row => row.name))].filter(n => n).sort();
                
                let html = '';
                names.forEach(name => {
                    html += `<option value="${name}">${name}</option>`;
                });
                employeeList.innerHTML = html;
            }

            function renderTable() {
                const tbody = document.getElementById('statsTableBody');
                const filterDate = document.getElementById('filterDate').value;
                const filterName = document.getElementById('filterName') ? document.getElementById('filterName').value : '';
                
                // 타이틀 업데이트 로직
                const dashboardTitleObj = document.getElementById('dashboardTitle');
                const printTitleObj = document.getElementById('printTitle');
                let titleStr = "전체 PC 접속시간 현황 보고서";
                if (filterName) {
                    titleStr = `${filterName} 직원 PC 접속시간 현황 보고서`;
                }
                if (filterDate) {
                    titleStr = `[${filterDate}] ` + titleStr;
                }
                if (dashboardTitleObj) dashboardTitleObj.textContent = titleStr;
                if (printTitleObj) printTitleObj.textContent = titleStr;
                
                const formatTime = (timeStr) => {
                    if (!timeStr || timeStr === '-') return '-';
                    try {
                        const d = new Date(timeStr);
                        if (isNaN(d.getTime())) return timeStr;
                        return d.toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul', hour12: false });
                    } catch(e) { return timeStr; }
                };
                
                const formatOnlyDate = (timeStr) => {
                    if (!timeStr || timeStr === '-') return '-';
                    try {
                        const d = new Date(timeStr);
                        if (isNaN(d.getTime())) return timeStr;
                        return d.toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul' });
                    } catch(e) { return timeStr; }
                };
                
                const getFilterFormat = (timeStr) => {
                    if (!timeStr || timeStr === '-') return '-';
                    try {
                        const d = new Date(timeStr);
                        if (isNaN(d.getTime())) return timeStr;
                        return d.toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' });
                    } catch(e) { return timeStr; }
                };

                let html = '';
                
                const groupedLogs = {};
                allStatsData.forEach(row => {
                    if (filterName && row.name !== filterName) return;
                    const dateKey = formatOnlyDate(row.date);
                    if (!dateKey || dateKey === '-') return;
                    
                    let isBootValid = true;
                    if (row.bootTime && row.bootTime !== '-') {
                        const rowDateMs = new Date(row.date).setHours(0,0,0,0);
                        const bootMs = new Date(row.bootTime).getTime();
                        if (!isNaN(rowDateMs) && !isNaN(bootMs)) {
                            if (bootMs < rowDateMs - (24 * 60 * 60 * 1000)) {
                                isBootValid = false;
                            }
                        }
                    }
                    const safeBootTime = isBootValid ? row.bootTime : '-';
                    
                    const groupKey = dateKey + '|' + row.name;
                    if (!groupedLogs[groupKey]) {
                        groupedLogs[groupKey] = { date: row.date, name: row.name, bootTime: safeBootTime, offTime: row.offTime };
                    } else {
                        const currentBoot = new Date(groupedLogs[groupKey].bootTime).getTime();
                        const rowBoot = new Date(safeBootTime).getTime();
                        if (!isNaN(rowBoot) && (isNaN(currentBoot) || rowBoot < currentBoot)) {
                            groupedLogs[groupKey].bootTime = safeBootTime;
                        }
                        
                        const currentOff = new Date(groupedLogs[groupKey].offTime).getTime();
                        const rowOff = new Date(row.offTime).getTime();
                        if (!isNaN(rowOff) && (isNaN(currentOff) || rowOff > currentOff)) {
                            groupedLogs[groupKey].offTime = row.offTime;
                        }
                    }
                });
                
                const processedLogs = Object.values(groupedLogs).sort((a,b) => new Date(a.date) - new Date(b.date));

                // 최신순 정렬
                processedLogs.slice().reverse().forEach(row => {
                    const rowFilterDate = getFilterFormat(row.date);
                    
                    // 날짜 필터 적용
                    if (filterDate && rowFilterDate !== filterDate && row.date !== filterDate) return;

                    html += `
                        <tr>
                            <td data-label="날짜" style="white-space: nowrap;">${formatOnlyDate(row.date)}</td>
                            <td data-label="이름" style="white-space: nowrap; word-break: keep-all;">${row.name}</td>
                            <td data-label="출근(PC 켠 시간)" style="white-space: nowrap;">${formatTime(row.bootTime)}</td>
                            <td data-label="퇴근(PC 끈 시간)" style="white-space: nowrap;">${formatTime(row.offTime)}</td>
                        </tr>
                    `;
                });

                if(!html) html = '<tr><td colspan="4" style="text-align:center;">데이터가 없습니다.</td></tr>';
                tbody.innerHTML = html;
            }

            document.getElementById('refreshBtn').addEventListener('click', loadStats);
            document.getElementById('filterDate').addEventListener('change', renderTable);
            
            const filterNameEl = document.getElementById('filterName');
            if(filterNameEl) {
                filterNameEl.addEventListener('change', renderTable);
            }

            // 비밀번호 변경
            const pwdModal = document.getElementById('pwdModal');
            document.getElementById('changePwdBtn').addEventListener('click', () => {
                pwdModal.classList.add('active');
            });
            document.getElementById('cancelPwdBtn').addEventListener('click', () => {
                pwdModal.classList.remove('active');
            });

            document.getElementById('savePwdBtn').addEventListener('click', async () => {
                const oldPwd = document.getElementById('oldPwd').value;
                const newPwd = document.getElementById('newPwd').value;

                if(!oldPwd || !newPwd) return alert('모두 입력해주세요.');

                const oldHash = await sha256(oldPwd);
                const newHash = await sha256(newPwd);

                try {
                    const url = `${CONFIG.GAS_URL}?action=changeAdminPassword&adminId=admin&oldPassword=${encodeURIComponent(oldHash)}&newPassword=${encodeURIComponent(newHash)}&t=${Date.now()}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    alert(result.message);
                    if(result.status === 'success') {
                        pwdModal.classList.remove('active');
                        document.getElementById('oldPwd').value = '';
                        document.getElementById('newPwd').value = '';
                    }
                } catch(e) {
                    alert('오류 발생');
                }
            });

            // 직인 업로드 로직 (Canvas 리사이징)
            const sealUpload = document.getElementById('sealUpload');
            const sealPreview = document.getElementById('sealPreview');
            const printSealImg = document.getElementById('printSealImg');

            sealUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // 최대 크기 150x150
                        const maxSize = 150;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxSize) {
                                height *= maxSize / width;
                                width = maxSize;
                            }
                        } else {
                            if (height > maxSize) {
                                width *= maxSize / height;
                                height = maxSize;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        const base64Seal = canvas.toDataURL('image/png');
                        sealPreview.src = base64Seal;
                        sealPreview.style.display = 'block';
                        printSealImg.src = base64Seal;
                        printSealImg.style.display = 'block';

                        // 서버에 저장 (POST -> doPost)
                        try {
                            const response = await fetch(CONFIG.GAS_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: `action=uploadSeal&sealData=${encodeURIComponent(base64Seal)}`
                            });
                            const result = await response.json();
                            if(result.status === 'success') {
                                alert('직인이 성공적으로 저장되었습니다.');
                            }
                        } catch(error) {
                            console.error('직인 저장 실패', error);
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });

            // 서버에서 직인 로드
            async function loadSeal() {
                try {
                    const url = `${CONFIG.GAS_URL}?action=getSeal&t=${Date.now()}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    if(result.status === 'success' && result.sealData) {
                        sealPreview.src = result.sealData;
                        sealPreview.style.display = 'block';
                        printSealImg.src = result.sealData;
                        printSealImg.style.display = 'block';
                    }
                } catch(e) {
                    console.error('직인 로드 실패', e);
                }
            }

            // 인쇄 기능
            document.getElementById('printBtn').addEventListener('click', () => {
                // 원본 테이블 복사
                const tableHtml = document.getElementById('statsTable').outerHTML;
                document.getElementById('printTableContainer').innerHTML = tableHtml;

                // 출력 문구 업데이트
                const filterName = document.getElementById('filterName') ? document.getElementById('filterName').value : '';
                const certifyText = filterName ? `위와 같이 ${filterName} 직원의 근무 사실을 증명합니다.` : '위와 같이 직원의 근무 사실을 증명합니다.';
                const certTextEl = document.getElementById('printCertifyText');
                if (certTextEl) certTextEl.textContent = certifyText;

                const today = new Date();
                const dateText = `출력 날짜 : ${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`;
                const dateTextEl = document.getElementById('printDateText');
                if (dateTextEl) dateTextEl.textContent = dateText;

                window.print();
            });

            // 기본 날짜를 오늘로 설정
            function setDefaultDate() {
                const tzOffset = new Date().getTimezoneOffset() * 60000;
                const localISOTime = (new Date(Date.now() - tzOffset)).toISOString().slice(0, 10);
                const filterDateEl = document.getElementById('filterDate');
                if (filterDateEl && !filterDateEl.value) {
                    filterDateEl.value = localISOTime;
                }
            }

            // 탭 변경 로직
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('active');
                        b.classList.add('secondary-button');
                    });
                    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                    
                    e.target.classList.add('active');
                    e.target.classList.remove('secondary-button');
                    document.getElementById(e.target.dataset.tab).style.display = 'block';
                });
            });

            // 회원 정보 로드
            async function loadUsers() {
                const tbody = document.getElementById('usersTableBody');
                if (!tbody) return;
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">회원 목록을 불러오는 중...</td></tr>';
                try {
                    const url = `${CONFIG.GAS_URL}?action=getUsers&t=${Date.now()}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    if(result.status === 'success') {
                        renderUsers(result.data);
                    } else {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">회원 목록 불러오기 실패</td></tr>';
                    }
                } catch(e) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">통신 오류</td></tr>';
                }
            }

            function renderUsers(users) {
                const tbody = document.getElementById('usersTableBody');
                let html = '';
                users.forEach(user => {
                    // admin 아이디는 숨기기
                    if (user.team === 'admin' || user.name === 'admin') return; 

                    html += `
                        <tr>
                            <td data-label="부서">${user.team}</td>
                            <td data-label="이름" style="font-weight:bold;">${user.name}</td>
                            <td data-label="직급">${user.role}</td>
                            <td data-label="상태">
                                <select class="status-select" data-name="${user.name}" style="width: 100%; max-width: 150px; padding: 5px;">
                                    <option value="재직" ${user.status === '재직' ? 'selected' : ''}>재직</option>
                                    <option value="휴직" ${user.status === '휴직' ? 'selected' : ''}>휴직</option>
                                    <option value="퇴사" ${user.status === '퇴사' ? 'selected' : ''}>퇴사</option>
                                </select>
                            </td>
                            <td data-label="비밀번호 재설정">
                                <button class="secondary-button reset-pwd-btn" data-name="${user.name}" style="padding: 6px 12px; width: auto; font-size: 13px;">비밀번호 초기화</button>
                            </td>
                        </tr>
                    `;
                });
                if(!html) html = '<tr><td colspan="5" style="text-align:center;">회원이 없습니다.</td></tr>';
                tbody.innerHTML = html;

                // 상태 변경 이벤트
                document.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', async (e) => {
                        const name = e.target.dataset.name;
                        const status = e.target.value;
                        if(confirm(`${name} 직원의 상태를 '${status}'(으)로 변경하시겠습니까?`)) {
                            try {
                                const url = `${CONFIG.GAS_URL}?action=updateUserStatus&name=${encodeURIComponent(name)}&status=${encodeURIComponent(status)}&t=${Date.now()}`;
                                const response = await fetch(url);
                                const result = await response.json();
                                alert(result.message);
                            } catch(err) {
                                alert('상태 변경 실패');
                                loadUsers(); // 원상복구
                            }
                        } else {
                            loadUsers(); // 원상복구
                        }
                    });
                });

                // 비밀번호 초기화 이벤트
                document.querySelectorAll('.reset-pwd-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const name = e.target.dataset.name;
                        const newPwd = prompt(`${name} 직원의 새 비밀번호(숫자 4자리)를 입력하세요:`);
                        if (newPwd !== null) {
                            if (!/^[0-9]{4}$/.test(newPwd)) {
                                alert('비밀번호는 숫자 4자리여야 합니다.');
                                return;
                            }
                            const hash = await sha256(newPwd);
                            try {
                                const url = `${CONFIG.GAS_URL}?action=resetUserPassword&name=${encodeURIComponent(name)}&newPasswordHash=${encodeURIComponent(hash)}&t=${Date.now()}`;
                                const response = await fetch(url);
                                const result = await response.json();
                                alert(result.message);
                            } catch(err) {
                                alert('비밀번호 재설정 실패');
                            }
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
