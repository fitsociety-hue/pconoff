<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근태 관리 - 대시보드</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <div class="glass-container">
        <h2>안녕하세요, <span id="userNameDisplay"></span>님</h2>
        <div class="status-badge">오늘 출근이 기록되었습니다.</div>
        
        <div class="time-display" id="currentTime">
            --:--:--
        </div>

        <button id="offBtn" style="background-color: var(--error-color);">퇴근하기 (종료)</button>
        <button id="logoutBtn" class="secondary-button" style="margin-bottom: 20px;">로그아웃</button>

        <!-- 개인 기록 테이블 영역 -->
        <h3 style="margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;">내 출퇴근 기록</h3>
        <div style="max-height: 300px; overflow-y: auto; border-radius: 8px;">
            <table style="width: 100%; border-collapse: collapse; font-size: 14px; background: rgba(255,255,255,0.6);">
                <thead>
                    <tr>
                        <th style="padding: 10px; background: rgba(255,255,255,0.8);">날짜</th>
                        <th style="padding: 10px; background: rgba(255,255,255,0.8);">출근</th>
                        <th style="padding: 10px; background: rgba(255,255,255,0.8);">퇴근</th>
                        <th style="padding: 10px; background: rgba(255,255,255,0.8);">시간외</th>
                    </tr>
                </thead>
                <tbody id="myStatsTableBody">
                    <tr><td colspan="4" style="text-align:center; padding: 10px;">기록을 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 시간외근무 팝업 -->
    <div class="modal-overlay" id="overtimeModal">
        <div class="modal-content">
            <h3 style="color: var(--primary-dark);">시간외근무 안내</h3>
            <p>18:10이 지났습니다.<br>시간외근무를 신청하시겠습니까?</p>
            <div style="margin-top: 20px;">
                <button id="applyOvertimeBtn" style="margin-bottom: 10px;">네, 신청합니다</button>
                <button id="declineOvertimeBtn" class="secondary-button">아니요, 곧 퇴근합니다</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
