<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근태 관리 - 대시보드</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>
<body>
    <div class="main-wrapper" style="display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; max-width: 960px; box-sizing: border-box;">
        <div class="glass-container wide" style="margin-bottom: 0;">
        <h2>안녕하세요, <span id="userNameDisplay"></span>님</h2>
        <div class="status-badge">오늘 출근이 기록되었습니다.</div>
        
        <div class="time-display" id="currentTime">
            --:--:--
        </div>

        <button id="offBtn" style="background-color: var(--error-color);">퇴근하기 (종료)</button>
        <button id="logoutBtn" class="secondary-button">로그아웃</button>
    </div>

    <!-- 나의 근태 기록 -->
    <div class="glass-container wide">
        <div class="user-logs-section" style="text-align: left;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0; color: var(--primary-dark); white-space: nowrap;">나의 근태 기록</h3>
                <select id="userLogFilter" style="padding: 5px; border-radius: 5px; border: 1px solid var(--glass-border);">
                    <option value="all">전체보기</option>
                    <option value="daily">오늘</option>
                    <option value="weekly">이번 주</option>
                    <option value="monthly">이번 달</option>
                </select>
            </div>
            <div style="overflow-x: auto;">
                <table id="userLogTable" style="width: 100%; font-size: 0.9em;">
                    <thead>
                        <tr>
                            <th style="white-space: nowrap;">날짜</th>
                            <th style="white-space: nowrap;">출근(PC 켠 시간)</th>
                            <th style="white-space: nowrap;">퇴근(PC 끈 시간)</th>
                        </tr>
                    </thead>
                    <tbody id="userLogTableBody">
                        <tr><td colspan="3" style="text-align: center;">기록을 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
